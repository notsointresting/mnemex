name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    name: core ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core package and development tools (no vector extra)
        run: python -m pip install -e ".[dev]"
      - name: Assert sqlite-vec is not installed in core mode
        run: python -c "import importlib.util; assert importlib.util.find_spec('sqlite_vec') is None, 'sqlite_vec must not be a core dependency'"
      - name: Lint
        run: python -m ruff check src tests tools
      - name: Test
        run: python -m pytest
      - name: Build wheel and source bundle
        run: |
          python -m pip install build
          python -m build --wheel
          python tools/build_release_bundle.py
      - name: Audit release artifacts (no native payloads, pure wheel, core deps)
        run: python tools/audit_release_artifacts.py dist
      - name: Upload release audit report (CI evidence)
        uses: actions/upload-artifact@v4
        with:
          name: release-audit-${{ matrix.os }}-py${{ matrix.python-version }}
          path: build/release-audit.json
      - name: Upload distributable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mnemex-core-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*
      - name: Clean-install wheel smoke test (fresh venv, with dependencies)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .venv-smoke
          python -m venv .venv-smoke
          if [ -f .venv-smoke/bin/python ]; then
            PY=.venv-smoke/bin/python
          else
            PY=.venv-smoke/Scripts/python
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install dist/*.whl
          "$PY" -c "import importlib.util; assert importlib.util.find_spec('sqlite_vec') is None, 'core wheel must not pull sqlite_vec'"
          "$PY" -c "import mnemex; from mnemex.__main__ import main; assert mnemex.__version__ == '0.1.0'; assert main(['--version']) == 0"
          MNEMEX_NO_VEC=1 "$PY" -m mnemex demo --offline --json

  vector:
    name: vector ${{ matrix.os }} / Python 3.13
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package with development and vector extras
        run: python -m pip install -e ".[dev,vector]"
      - name: Assert sqlite-vec is installed in vector mode
        run: python -c "import importlib.util; assert importlib.util.find_spec('sqlite_vec') is not None, 'vector extra must install sqlite_vec'"
      - name: Lint
        run: python -m ruff check src tests tools
      - name: Retrieval and vector-backed storage tests
        run: python -m pytest tests/test_retrieval.py tests/test_storage.py
      - name: Full test suite
        run: python -m pytest
